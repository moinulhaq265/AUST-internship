<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <!-- list  -->
    <!-- order list. -->
     <h2>Ordered List</h2>
     <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
     </ol>

     <!-- unorderd list. -->
      <h2>Unordered List</h2>
      <ul>
        <li>Java</li>
        <li>python</li>
        <li>C++</li>
      </ul>
</body>
</html>
